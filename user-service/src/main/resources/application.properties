spring.application.name=user-service
server.port=7872
# Fix for Config Server dependency
spring.config.import=optional:configserver:

# Eureka Server URL (IMPORTANT)
eureka.client.service-url.defaultZone=http://localhost:7870/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10

eureka.client.registry-fetch-interval-seconds=5

# DATABASE DB postgresql

spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

#virtual thread
spring.threads.virtual.enabled=true
spring.aot.enabled=true

